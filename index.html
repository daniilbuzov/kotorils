<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>КОТО-РИЛС 🎵</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Onest:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#08060f;--surface:#0f0d1c;--surface2:#181530;
  --border:rgba(180,130,255,.15);--border2:rgba(180,130,255,.32);
  --accent:#b87fff;--accent2:#ff7eb3;--text:#f0e8ff;--dim:#9984c8;
  --font:'Onest',system-ui,sans-serif;
}

:root.light-mode{
  --bg:#f8f7fc;--surface:#f0e8ff;--surface2:#e8deff;
  --border:rgba(184,127,255,.2);--border2:rgba(184,127,255,.4);
  --accent:#9966ff;--accent2:#ff1493;--text:#1a0033;--dim:#8b7cb8;
}

:root.neon-mode{
  --bg:#0a0015;--surface:#1a0033;--surface2:#330066;
  --accent:#ff00ff;--accent2:#00ffff;--text:#ffff00;--dim:#ff00ff;
}

html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;transition:background .3s, color .3s}
button{border:none;background:none;color:inherit;font:inherit;cursor:pointer}
input,textarea,select{border:none;background:none;color:inherit;font:inherit;outline:none}

.app{width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden}

@media(min-width:900px){
  .app{flex-direction:row}
  .sidebar{display:flex!important;flex-direction:column;width:240px;min-width:240px;height:100%;background:var(--surface);border-right:1px solid var(--border);padding:28px 14px 24px;gap:4px;flex-shrink:0}
  .sidebar-logo{font-family:'Unbounded',sans-serif;font-size:1.15rem;font-weight:900;background:linear-gradient(120deg,#ffd6a8,#c97bff,#7ed4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;padding:8px 12px 20px}
  .sidebar .snav{display:flex;align-items:center;gap:14px;padding:13px 14px;border-radius:14px;font-weight:600;font-size:.95rem;color:var(--dim);cursor:pointer;transition:background .15s,color .15s;width:100%}
  .sidebar .snav:hover{background:var(--surface2);color:var(--text)}
  .sidebar .snav.active{background:var(--surface2);color:var(--text);font-weight:700}
  .sidebar .snav-icon{font-size:1.4rem;width:26px;text-align:center}
  .sidebar-spacer{flex:1}
  .sidebar-upload{display:flex;flex-direction:column;gap:10px;padding-top:16px;border-top:1px solid var(--border)}
  .sidebar-url{background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:11px 14px;font-size:.85rem;color:var(--text);width:100%}
  .sidebar-url::placeholder{color:var(--dim)}
  .sidebar-btn-row{display:flex;gap:8px}
  .sidebar-icon-btn{flex:1;height:42px;background:#6c4bc2;border-radius:10px;font-size:1.1rem;color:white;box-shadow:0 4px 0 #3d2d66;transition:transform .08s,box-shadow .08s}
  .sidebar-icon-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #3d2d66}
  .sidebar-counter-badge{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:7px 12px;font-size:.82rem;font-weight:700;color:var(--accent);text-align:center;margin-bottom:6px}
  .sidebar-search{display:flex;align-items:center;gap:0;background:var(--surface2);border:1px solid var(--border2);border-radius:12px;overflow:hidden;margin-bottom:4px}
  .sidebar-search-inp{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:.85rem;padding:11px 14px}
  .sidebar-search-inp::placeholder{color:var(--dim)}
  .sidebar-search-btn{background:none;border:none;cursor:pointer;padding:0 12px;font-size:1rem;color:var(--dim);transition:color .15s}
  .sidebar-search-btn:hover{color:var(--text)}
  .main-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
  .topbar{display:none!important}
  .bottom-nav{display:none!important}
  .upload-bar{display:none!important}
}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar-logo{font-family:'Unbounded',sans-serif;font-weight:900;font-size:1.2rem;background:linear-gradient(120deg,#ffd6a8,#c97bff,#7ed4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-counter{background:var(--surface2);border:1px solid var(--border2);border-radius:40px;padding:5px 14px;font-size:.8rem;font-weight:700;color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:10px}
.search-wrap{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border2);border-radius:100px;overflow:hidden;height:34px}
.search-inp{background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:.82rem;padding:0 12px;width:110px;transition:width .2s}
.search-inp:focus{width:150px}
.search-inp::placeholder{color:var(--dim)}
.search-go{background:none;border:none;cursor:pointer;padding:0 10px;font-size:.95rem;color:var(--dim);transition:color .15s}
.search-go:active{color:var(--text)}

.cat-short-id{position:absolute;top:14px;left:14px;z-index:10;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.18);border-radius:100px;padding:5px 12px;font-family:'Unbounded',sans-serif;font-size:.72rem;font-weight:700;color:rgba(255,255,255,.9);pointer-events:none;letter-spacing:.05em}
.sidebar{display:none}
.main-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.content-area{flex:1;overflow:hidden;min-height:0}

.feed{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.feed::-webkit-scrollbar{display:none}
.reel{height:100%;scroll-snap-align:start;scroll-snap-stop:always;position:relative;background:#000;display:flex;flex-direction:column;justify-content:flex-end;flex-shrink:0}
.media-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#000}
.media-wrap img,.media-wrap video{width:100%;height:100%;object-fit:cover}
.media-fallback{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#12103a;gap:10px;color:var(--accent)}
.media-fallback .fi{font-size:3.5rem}
.grad{position:absolute;bottom:0;left:0;right:0;height:58%;background:linear-gradient(to top,rgba(0,0,0,.93),transparent);pointer-events:none;z-index:2}

.pause-overlay{position:absolute;inset:0;z-index:8;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.32);opacity:0;pointer-events:none;transition:opacity .18s}
.pause-overlay.show{opacity:1}
.pause-icon{font-size:5rem;filter:drop-shadow(0 2px 20px rgba(0,0,0,.9))}

.overlay{position:fixed;inset:0;z-index:600;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.65);backdrop-filter:blur(10px);opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}

.sheet{width:100%;max-width:500px;background:var(--surface);border-radius:24px 24px 0 0;border-top:1px solid var(--border2);padding:16px 20px calc(28px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .28s cubic-bezier(.25,.8,.25,1)}
.overlay.open .sheet{transform:translateY(0)}

.sheet.tall{height:90vh;display:flex;flex-direction:column;padding:0}

.sheet-handle{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,.18);margin:0 auto 18px}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:linear-gradient(90deg,rgba(184,127,255,.1),rgba(255,126,179,.1))}
.sheet-title{font-family:'Unbounded',sans-serif;font-size:1rem;font-weight:900;background:linear-gradient(120deg,#ffd6a8,#ff7eb3);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.close-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:var(--dim);cursor:pointer;font-size:1.3rem;background:rgba(184,127,255,.1);border-radius:50%;transition:background .15s}
.close-btn:active{background:rgba(184,127,255,.25)}

.sheet-content{flex:1;overflow-y:auto;padding:20px}
.settings-section{margin-bottom:24px}
.settings-section-title{font-family:'Unbounded',sans-serif;font-size:.9rem;font-weight:700;color:var(--accent);margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em}
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:14px;background:rgba(184,127,255,.08);border:1px solid var(--border2);border-radius:12px;margin-bottom:10px}
.settings-label{font-size:.9rem;color:var(--text);font-weight:600}
.settings-select{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-family:var(--font);font-size:.85rem;cursor:pointer;transition:border-color .15s}
.settings-select:focus{border-color:var(--accent)}
.settings-button{width:100%;padding:14px;background:linear-gradient(135deg,#b87fff,#ff7eb3);color:white;border-radius:12px;font-weight:700;font-size:.9rem;margin-top:8px;cursor:pointer;transition:transform .1s}
.settings-button:active{transform:scale(.98)}

.profile-edit-content{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column}
.profile-edit-field{margin-bottom:18px}
.profile-edit-label{font-size:.85rem;color:var(--dim);font-weight:600;margin-bottom:6px;display:block}
.profile-edit-input{width:100%;background:var(--surface2);border:1.5px solid var(--border2);border-radius:12px;padding:12px;color:var(--text);font-family:var(--font);font-size:.9rem;transition:border-color .15s}
.profile-edit-input:focus{border-color:var(--accent)}
.emoji-picker-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:8px}
.emoji-btn{background:rgba(184,127,255,.1);border:2px solid var(--border2);border-radius:10px;padding:10px;font-size:1.8rem;cursor:pointer;transition:all .15s}
.emoji-btn.active{background:rgba(184,127,255,.3);border-color:var(--accent)}
.profile-edit-save{width:100%;padding:14px;background:linear-gradient(135deg,#b87fff,#ff7eb3);color:white;border-radius:12px;font-weight:700;font-size:.9rem;cursor:pointer;margin-top:auto;transition:transform .1s}
.profile-edit-save:active{transform:scale(.98)}

.comment-item{display:flex;gap:10px;padding:14px;background:linear-gradient(135deg,rgba(184,127,255,.12),rgba(255,126,179,.08));border:1.5px solid var(--border2);border-radius:16px;animation:slideIn .3s ease-out;backdrop-filter:blur(10px);margin-bottom:10px}
.comment-ava{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;background:linear-gradient(135deg,#ff6b9d,#c44569);border:2px solid rgba(255,255,255,.3);box-shadow:0 4px 12px rgba(255,107,157,.3)}
.comment-body{flex:1;min-width:0}
.comment-name{font-weight:800;font-size:.85rem;color:var(--text);font-family:'Unbounded',sans-serif;background:linear-gradient(120deg,#ffd6a8,#ff7eb3);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.comment-time{font-size:.7rem;color:var(--dim);margin-left:6px}
.comment-text{font-size:.85rem;color:var(--text);margin-top:6px;line-height:1.5;word-wrap:break-word}
.comments-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--dim);font-size:1rem;text-align:center;padding:40px;flex-direction:column;gap:12px}
.comments-input-area{padding:16px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0;background:linear-gradient(180deg,transparent,rgba(184,127,255,.08))}
.comment-inp{flex:1;background:var(--surface2);border:1.5px solid var(--border2);border-radius:100px;padding:12px 18px;font-size:.85rem;color:var(--text);max-height:100px;resize:none;transition:border-color .15s}
.comment-inp:focus{border-color:var(--accent);background:rgba(184,127,255,.1)}
.comment-send-btn{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#b87fff,#ff7eb3);display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:white;flex-shrink:0;cursor:pointer;box-shadow:0 4px 12px rgba(184,127,255,.4);transition:transform .1s}
.comment-send-btn:active{transform:scale(.92)}

.reel-number{position:absolute;top:14px;left:14px;z-index:10;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.18);border-radius:100px;padding:5px 13px;font-family:'Unbounded',sans-serif;font-size:.8rem;font-weight:700;color:rgba(255,255,255,.9)}

.viz-bar{position:absolute;bottom:0;left:0;right:0;height:3px;z-index:10;overflow:hidden;background:transparent}
.viz-progress{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;transition:none}

.wave-vis{position:absolute;right:14px;bottom:360px;z-index:6;display:flex;align-items:flex-end;gap:2px;height:28px}
.wave-bar{width:3px;border-radius:2px;background:rgba(255,255,255,.7);min-height:3px;transition:height .08s ease}

.reel-side-actions{position:absolute;right:14px;bottom:110px;display:flex;flex-direction:column;align-items:center;gap:22px;z-index:5}
.reel-side-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.reel-side-icon{font-size:1.8rem;filter:drop-shadow(0 2px 6px rgba(0,0,0,.7));transition:transform .1s}
.reel-side-btn:active .reel-side-icon{transform:scale(.88)}
.reel-side-count{font-size:.72rem;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.8)}

.mute-btn,.settings-btn{position:absolute;top:14px;z-index:10;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer;transition:background .15s}
.mute-btn:active,.settings-btn:active{transform:scale(.9)}
.mute-btn{right:14px}
.settings-btn{right:60px}

.reel-footer{position:relative;z-index:4;padding:0 70px 28px 18px;display:flex;flex-direction:column;gap:10px}
.cat-row{display:flex;align-items:center;gap:12px}
.cat-ava{width:46px;height:46px;border-radius:50%;background:linear-gradient(145deg,#b87fff,#ff7eb3);display:flex;align-items:center;justify-content:center;font-size:1.6rem;border:2px solid rgba(255,255,255,.55);flex-shrink:0}
.cat-name{font-family:'Unbounded',sans-serif;font-weight:700;font-size:1rem;text-shadow:0 2px 8px rgba(0,0,0,.8)}
.cat-origin{color:#c5a8ff;font-size:.78rem;margin-top:1px}

.reel-bottom-bar{display:flex;gap:8px;flex-wrap:wrap}
.pill{background:rgba(8,6,15,.65);backdrop-filter:blur(14px);border:1.5px solid rgba(180,130,255,.3);border-radius:100px;padding:9px 20px;color:var(--text);font-weight:700;font-size:.9rem;display:flex;align-items:center;gap:7px;cursor:pointer;transition:transform .1s}
.pill:active{transform:scale(.92)}

.loading-slide{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:16px;color:var(--accent);font-weight:700}
.spinner{width:36px;height:36px;border:3px solid rgba(184,127,255,.25);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.upload-bar{background:var(--surface);border-top:1px solid var(--border);padding:10px 12px;display:flex;gap:8px;align-items:center;flex-shrink:0}
.url-inp{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:100px;padding:11px 16px;font-size:.88rem;color:var(--text)}
.icon-btn{width:44px;height:44px;background:#6c4bc2;border-radius:50%;font-size:1.1rem;color:white;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 0 #3d2d66;transition:transform .08s;flex-shrink:0}
.icon-btn:active{transform:translateY(3px)}

.bottom-nav{display:flex;background:var(--surface);border-top:1px solid var(--border);padding:6px 0 calc(6px + env(safe-area-inset-bottom));flex-shrink:0}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;color:var(--dim);font-size:.72rem;font-weight:600;cursor:pointer;border-radius:14px;transition:color .15s}
.bnav-btn.active{color:var(--text)}

.profile-wrap{height:100%;overflow-y:auto;background:var(--bg)}
.profile-hero{padding:28px 20px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:relative}
.profile-hero-actions{position:absolute;top:20px;right:20px;display:flex;gap:10px}
.profile-hero-btn{width:40px;height:40px;background:rgba(184,127,255,.2);border:1px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer}
.profile-top{display:flex;align-items:center;gap:22px;margin-bottom:18px}
.profile-ava{width:80px;height:80px;border-radius:50%;background:linear-gradient(145deg,#8e5fd6,#e06aaa);display:flex;align-items:center;justify-content:center;font-size:2.8rem;border:3px solid var(--bg);box-shadow:0 0 0 2px var(--accent);flex-shrink:0}
.profile-stats{display:flex;gap:28px}
.p-stat{text-align:center}
.p-stat-n{font-family:'Unbounded',sans-serif;font-size:1.4rem;font-weight:900}
.p-stat-l{font-size:.78rem;color:var(--dim);margin-top:2px}
.profile-name{font-family:'Unbounded',sans-serif;font-size:.9rem;font-weight:700;margin-bottom:4px}
.profile-bio{font-size:.82rem;color:var(--dim);line-height:1.5}

.p-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface)}
.p-tab{flex:1;text-align:center;padding:15px;font-weight:700;color:var(--dim);cursor:pointer;border-bottom:2.5px solid transparent;transition:color .15s}
.p-tab.active{color:var(--text);border-bottom-color:var(--accent)}

.p-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:2px}
.p-cell{aspect-ratio:1;background:var(--surface2);overflow:hidden;cursor:pointer;position:relative}
.p-cell img,.p-cell video{width:100%;height:100%;object-fit:cover}
.p-cell-fb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;background:#12103a}
.p-empty{grid-column:span 3;text-align:center;padding:60px 20px;color:var(--dim)}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(12,10,24,.94);backdrop-filter:blur(14px);border:1.5px solid var(--accent);color:var(--text);padding:10px 24px;border-radius:100px;font-size:.85rem;font-weight:700;z-index:999;white-space:nowrap;animation:tst 2.6s forwards}
@keyframes tst{0%{opacity:0;transform:translateX(-50%) translateY(16px)}14%{opacity:1}80%{opacity:1}100%{opacity:0}}

.heart-burst{position:absolute;inset:0;z-index:6;display:flex;align-items:center;justify-content:center;font-size:5rem;pointer-events:none;opacity:0}
.heart-burst.pop{animation:hpop .65s forwards}
@keyframes hpop{0%{opacity:0;transform:scale(.4)}25%{opacity:1}55%{opacity:1}100%{opacity:0}}

@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.download-progress{width:100%;height:6px;background:rgba(184,127,255,.2);border-radius:3px;margin-top:12px;overflow:hidden}
.download-progress-bar{height:100%;background:linear-gradient(90deg,#b87fff,#ff7eb3);width:0%;transition:width .2s}
</style>
</head>
<body>

<!-- OVERLAYS -->
<div class="overlay" id="shareOverlay"><div class="sheet"><div class="sheet-handle"></div><div style="font-family:'Unbounded',sans-serif;font-size:.92rem;font-weight:700;text-align:center;margin-bottom:16px">Поделиться котом 🐱</div><div style="background:var(--surface2);border:1px solid var(--border2);border-radius:18px;padding:18px 20px;margin-bottom:16px;text-align:center"><div style="font-size:.75rem;color:var(--dim);margin-bottom:6px">Номер этого ролика</div><div id="shareNumBig" style="font-family:'Unbounded',sans-serif;font-size:2.8rem;font-weight:900;background:linear-gradient(120deg,#ffd6a8,#c97bff,#7ed4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px">#1</div></div><button class="share-close-btn" id="shareCloseBtn" style="width:100%;padding:13px;background:var(--surface2);border-radius:12px;font-weight:700;font-size:.9rem;color:var(--dim)">Закрыть</button></div></div>

<div class="overlay" id="commentsOverlay"><div class="sheet tall"><div class="sheet-header"><div class="sheet-title">🐾 Мяукай <span id="commentCount">(0)</span></div><div class="close-btn" id="commentsClose">✕</div></div><div style="flex:1;overflow-y:auto;padding:16px" id="commentsList"></div><div class="comments-input-area"><input type="text" class="comment-inp" id="commentInp" placeholder="Мяу…" maxlength="180"><button class="comment-send-btn" id="commentSendBtn">✓</button></div></div></div>

<div class="overlay" id="settingsOverlay"><div class="sheet tall"><div class="sheet-header"><div class="sheet-title">⚙️ Настройки</div><div class="close-btn" id="settingsClose">✕</div></div><div class="sheet-content" id="settingsContent"></div></div></div>

<script>
'use strict';
(() => {

// ════ ЛОКАЛИЗАЦИЯ ════
const i18n = {
  ru: {
    meow: '🐾 Мяукай',
    comments: 'Мяукай',
    theme: 'Тема',
    language: 'Язык',
    dark: '🌙 Тёмная',
    light: '☀️ Светлая',
    neon: '⚡ Neon',
    russian: '🇷🇺 Русский',
    english: '🇬🇧 English',
    download: '📥 Скачать 200 котов',
    downloadDesc: 'Сохрани котов себе на устройство для просмотра без интернета',
    downloading: 'Загружаем котов…',
    downloaded: 'Котов скачано!',
    catNotFound: 'Кот не найден 😿'
  },
  en: {
    meow: '🐾 Meow',
    comments: 'Meow',
    theme: 'Theme',
    language: 'Language',
    dark: '🌙 Dark',
    light: '☀️ Light',
    neon: '⚡ Neon',
    russian: '🇷🇺 Russian',
    english: '🇬🇧 English',
    download: '📥 Download 200 cats',
    downloadDesc: 'Save cats to your device for offline viewing',
    downloading: 'Loading cats…',
    downloaded: 'Cats downloaded!',
    catNotFound: 'Cat not found 😿'
  }
};

let lang = localStorage.getItem('lang') || 'ru';
let theme = localStorage.getItem('theme') || 'dark-mode';
const t = (key) => i18n[lang]?.[key] || key;

function updateLanguage() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    el.textContent = t(key);
  });
}

// ════ ПРОФИЛЬ ════
let userProfile = { nick: 'Котолюб_9000', emoji: '😺' };
const savedProfile = localStorage.getItem('userProfile');
if (savedProfile) userProfile = JSON.parse(savedProfile);

function saveProfile() {
  localStorage.setItem('userProfile', JSON.stringify(userProfile));
}

// ════ БОТЫ ════
const BOT_NAMES = ['Мурзик', 'Барсик', 'Снежок', 'Рыжик', 'Пушок', 'Кекс', 'Феликс', 'Том', 'Симба', 'Персик'];
const BOT_EMOJIS = ['😸', '😻', '😽', '😼', '🙀', '😿', '😾', '😺'];
const BOT_MESSAGES = ['Мяу! 🐱', 'Красиво! 😻', 'Обожаю! ❤️', 'Мур-мур! 🎵', 'Супер! 💣', 'Спасибо! 🙏'];

function generateBotComments(count = 2) {
  const comments = [];
  for(let i = 0; i < count; i++) {
    comments.push({
      text: BOT_MESSAGES[Math.floor(Math.random() * BOT_MESSAGES.length)],
      author: BOT_NAMES[Math.floor(Math.random() * BOT_NAMES.length)] + '_bot',
      emoji: BOT_EMOJIS[Math.floor(Math.random() * BOT_EMOJIS.length)],
      time: new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' }),
      isBot: true
    });
  }
  return comments;
}

// ════ КОММЕНТАРИИ ════
const CommentsEngine = (() => {
  let commentData = {};

  function getComments(catId) {
    if (!commentData[catId]) {
      commentData[catId] = generateBotComments(2);
    }
    return commentData[catId];
  }

  function addComment(catId, text) {
    if (!catId || !text.trim()) return null;
    if (!commentData[catId]) commentData[catId] = [];
    
    const now = new Date();
    const comment = {
      text: text.trim(),
      author: userProfile.nick,
      emoji: userProfile.emoji,
      time: now.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' }),
      isBot: false
    };
    commentData[catId].push(comment);
    
    if (Math.random() > 0.4) {
      setTimeout(() => {
        const botComment = generateBotComments(1)[0];
        if(commentData[catId]) commentData[catId].push(botComment);
      }, 1000);
    }
    
    return comment;
  }

  return { getComments, addComment };
})();

function openComments(cat) {
  const overlay = document.getElementById('commentsOverlay');
  const list = document.getElementById('commentsList');
  const inp = document.getElementById('commentInp');
  const count = document.getElementById('commentCount');

  overlay.classList.add('open');

  function renderComments() {
    const comments = CommentsEngine.getComments(cat.id);
    count.textContent = `(${comments.length})`;
    
    list.innerHTML = '';
    if (comments.length === 0) {
      list.innerHTML = `<div class="comments-empty"><div style="font-size:3rem">🐱</div><div>${t('comments')}</div></div>`;
      return;
    }
    
    comments.forEach(cmt => {
      const item = document.createElement('div');
      item.className = 'comment-item';
      item.innerHTML = `<div class="comment-ava">${cmt.emoji}</div><div class="comment-body"><div><span class="comment-name">${esc(cmt.author)}</span><span class="comment-time">${cmt.time}</span></div><div class="comment-text">${esc(cmt.text)}</div></div>`;
      list.appendChild(item);
    });
    list.scrollTop = list.scrollHeight;
  }

  renderComments();
  inp.focus();

  function sendComment() {
    const text = inp.value.trim();
    if (!text) return;
    CommentsEngine.addComment(cat.id, text);
    inp.value = '';
    setTimeout(() => renderComments(), 100);
  }

  document.getElementById('commentSendBtn').onclick = sendComment;
  inp.onkeydown = (e) => { if (e.key === 'Enter') sendComment(); };
}

document.getElementById('commentsClose').addEventListener('click', () => {
  document.getElementById('commentsOverlay').classList.remove('open');
});

// ════ НАСТРОЙКИ ════
function openSettings() {
  const overlay = document.getElementById('settingsOverlay');
  const content = document.getElementById('settingsContent');
  
  content.innerHTML = `
    <div class="settings-section">
      <div class="settings-section-title">${t('theme')}</div>
      <div class="settings-item">
        <span class="settings-label">Тема оформления</span>
        <select class="settings-select" id="themeSelect">
          <option value="dark-mode" ${theme === 'dark-mode' ? 'selected' : ''}>${t('dark')}</option>
          <option value="light-mode" ${theme === 'light-mode' ? 'selected' : ''}>${t('light')}</option>
          <option value="neon-mode" ${theme === 'neon-mode' ? 'selected' : ''}>${t('neon')}</option>
        </select>
      </div>
    </div>
    
    <div class="settings-section">
      <div class="settings-section-title">${t('language')}</div>
      <div class="settings-item">
        <span class="settings-label">Язык</span>
        <select class="settings-select" id="langSelect">
          <option value="ru" ${lang === 'ru' ? 'selected' : ''}>${t('russian')}</option>
          <option value="en" ${lang === 'en' ? 'selected' : ''}>${t('english')}</option>
        </select>
      </div>
    </div>
    
    <div class="settings-section">
      <div class="settings-section-title">Оффлайн</div>
      <button class="settings-button" id="downloadBtn">${t('download')}</button>
      <p style="font-size:.75rem; color:var(--dim); margin-top:8px">${t('downloadDesc')}</p>
      <div class="download-progress" id="downloadProgress" style="display:none">
        <div class="download-progress-bar" id="downloadProgressBar"></div>
      </div>
    </div>
  `;
  
  overlay.classList.add('open');
  
  document.getElementById('themeSelect').addEventListener('change', (e) => {
    theme = e.target.value;
    localStorage.setItem('theme', theme);
    document.documentElement.className = theme;
    toast('Тема изменена ✨');
  });
  
  document.getElementById('langSelect').addEventListener('change', (e) => {
    lang = e.target.value;
    localStorage.setItem('lang', lang);
    updateLanguage();
    toast('Язык изменён 🌍');
  });
  
  document.getElementById('downloadBtn').addEventListener('click', downloadCats);
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
}

document.getElementById('settingsClose').addEventListener('click', closeSettings);

// ════ СКАЧИВАНИЕ КОТОВ ════
async function downloadCats() {
  const btn = document.getElementById('downloadBtn');
  const progress = document.getElementById('downloadProgress');
  const progressBar = document.getElementById('downloadProgressBar');
  
  btn.disabled = true;
  btn.textContent = t('downloading');
  progress.style.display = 'block';
  progressBar.style.width = '0%';

  try {
    const catsToDownload = [];
    const API_IMG = 'https://api.thecatapi.com/v1/images/search?mime_types=jpg,png&limit=20&order=RANDOM';
    
    for (let i = 0; i < 10; i++) {
      const response = await fetch(API_IMG + '&_=' + Date.now());
      if (!response.ok) throw new Error('Network error');
      const data = await response.json();
      catsToDownload.push(...data);
      progressBar.style.width = ((i + 1) * 10) + '%';
      await new Promise(r => setTimeout(r, 200));
    }

    const dataStr = JSON.stringify(catsToDownload, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'kotoreels_200_cats.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    progressBar.style.width = '100%';
    await new Promise(r => setTimeout(r, 500));
    progress.style.display = 'none';
    btn.textContent = t('download');
    btn.disabled = false;
    toast(t('downloaded') + ' 200 котов 💾');
  } catch (e) {
    progress.style.display = 'none';
    btn.textContent = t('download');
    btn.disabled = false;
    toast('Ошибка при скачивании 😿', true);
  }
}

// ════ РЕДАКТИРОВАНИЕ ПРОФИЛЯ ════
function openProfileEdit() {
  const overlay = document.getElementById('profileEditOverlay');
  document.getElementById('profileNick').value = userProfile.nick;
  
  const emojiPicker = document.getElementById('emojiPicker');
  emojiPicker.innerHTML = '';
  const allEmojis = ['😺', '😸', '😻', '😽', '😼', '🙀', '😿', '😾', '🐱', '🐈'];
  allEmojis.forEach(emoji => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn' + (emoji === userProfile.emoji ? ' active' : '');
    btn.textContent = emoji;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      userProfile.emoji = emoji;
    });
    emojiPicker.appendChild(btn);
  });
  
  document.getElementById('profileSaveBtn').addEventListener('click', () => {
    userProfile.nick = document.getElementById('profileNick').value || 'Котолюб';
    saveProfile();
    document.getElementById('profileEditOverlay').classList.remove('open');
    toast('Профиль сохранён! 😺');
  }, { once: true });
  
  overlay.classList.add('open');
}

document.getElementById('profileEditClose').addEventListener('click', () => {
  document.getElementById('profileEditOverlay').classList.remove('open');
});

// ════ ОСНОВНОЙ КОД ════
const API_IMG='https://api.thecatapi.com/v1/images/search?mime_types=jpg,png&limit=8';
const API_VID='https://api.thecatapi.com/v1/images/search?mime_types=mp4&limit=2';
const NAMES=['Мурзик','Барсик','Снежок','Рыжик','Пушок','Кекс','Феликс','Том','Леопольд','Симба','Персик','Бублик'];
const AVATARS=['🐈','😸','😻','😽','😼','🙀','😿','😾'];
const CAPTIONS=['Охраняю диван 🛡️','Философствую 🤔','Жду еду ⏳','Шеф, всё пропало 😿','Просто лежу 😴','Кто я? 👁️'];

let allCats=[],myCats=[];
let screen='feed';
let loading=false,cooldown=false;
let currentCatId=null;

const vidObs=new IntersectionObserver(entries=>{
  entries.forEach(e=>e.isIntersecting?e.target.play().catch(()=>{}):e.target.pause());
},{threshold:0.55});

let reelObs=null;

function load(){try{return JSON.parse(localStorage.getItem('kotoreels_v9'))||{liked:[],my:[]}}catch{return{liked:[],my:[]}}}
function save(){
  try{localStorage.setItem('kotoreels_v9',JSON.stringify({liked:allCats.filter(c=>c.liked).map(c=>c.id),my:myCats.filter(c=>!c.url.startsWith('blob:'))}))}catch{}
}
const stored=load();

const $=id=>document.getElementById(id);
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
function plural(n){const m10=n%10,m100=n%100;if(m10===1&&m100!==11)return`${n} кот`;if([2,3,4].includes(m10)&&![12,13,14].includes(m100))return`${n} кота`;return`${n} котов`}
function rand(arr){return arr[Math.floor(Math.random()*arr.length)]}
function toast(msg,err=false){const t=document.createElement('div');t.className='toast'+(err?' err':'');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2700)}
function updateCounters(){const txt=plural(allCats.length);$('topCounter').textContent=txt;$('sideCounter').textContent=txt}

async function fetchJ(url,retries=2){
  for(let i=0;i<=retries;i++){
    try{const r=await fetch(url+'&_='+Date.now());if(!r.ok)throw new Error(r.status);return await r.json()}
    catch(e){if(i===retries)throw e;await new Promise(r=>setTimeout(r,700*(i+1)))}
  }
}

function makeShortId(seed) {
  const chars = 'АБВГДЕЖЗИКЛ';
  const nums  = '0123456789';
  let s = typeof seed === 'string' ? seed : String(seed);
  let h = 5381;
  for(let i=0;i<s.length;i++) h=(h*33)^s.charCodeAt(i);
  h = h>>>0;
  return 'КОТ-' + chars[h%chars.length] + nums[(h>>4)%10] + chars[(h>>8)%chars.length] + nums[(h>>12)%10];
}

function tocat(item,idx){
  const i=allCats.length+idx;
  const rawId=item.id||'c_'+Date.now()+'_'+i;
  return{
    id: rawId,
    shortId: makeShortId(rawId),
    name:NAMES[i%NAMES.length]+' '+(i+1),
    origin:'The Cat API',
    avatar:AVATARS[i%AVATARS.length],
    desc:rand(CAPTIONS),
    url:item.url,
    type:item.url.endsWith('.mp4')?'video':'image',
    likes:70+Math.floor(Math.random()*200),
    liked:false,
  };
}

function makeMedia(cat){
  const wrap=document.createElement('div'); wrap.className='media-wrap';
  if(cat.type==='video'){
    const v=document.createElement('video');
    v.src=cat.url; v.loop=v.muted=v.playsInline=true; v.preload='auto';
    v.onerror=()=>{wrap.innerHTML='<div class="media-fallback"><div class="fi">😿</div>видео недоступно</div>'};
    wrap.appendChild(v); vidObs.observe(v);
  } else {
    const img=document.createElement('img');
    img.src=cat.url; img.loading='lazy'; img.decoding='async';
    img.onerror=()=>{wrap.innerHTML='<div class="media-fallback"><div class="fi">😿</div>фото недоступно</div>'};
    wrap.appendChild(img);
  }
  return wrap;
}

function makeReel(cat){
  const reel=document.createElement('div'); reel.className='reel'; reel.dataset.id=cat.id;
  reel.appendChild(makeMedia(cat));
  const grad=document.createElement('div'); grad.className='grad'; reel.appendChild(grad);

  const idBadge=document.createElement('div'); idBadge.className='cat-short-id';
  idBadge.textContent=cat.shortId||'КОТ-????';
  reel.appendChild(idBadge);

  const muteBtn=document.createElement('button'); muteBtn.className='mute-btn'; muteBtn.textContent='🔊'; reel.appendChild(muteBtn);
  const settingsBtn=document.createElement('button'); settingsBtn.className='settings-btn'; settingsBtn.textContent='⚙️';
  settingsBtn.addEventListener('click', e => { e.stopPropagation(); openSettings(); });
  reel.appendChild(settingsBtn);

  const vizBar=document.createElement('div'); vizBar.className='viz-bar';
  const vizProg=document.createElement('div'); vizProg.className='viz-progress'; vizBar.appendChild(vizProg);
  reel.appendChild(vizBar);

  const hb=document.createElement('div'); hb.className='heart-burst'; hb.textContent='❤️'; reel.appendChild(hb);

  const side=document.createElement('div'); side.className='reel-side-actions';
  side.innerHTML=`
    <div class="reel-side-btn like-side">
      <div class="reel-side-icon">${cat.liked?'❤️':'🤍'}</div>
      <div class="reel-side-count">${cat.likes}</div>
    </div>
    <div class="reel-side-btn comments-side-btn">
      <div class="reel-side-icon">💬</div>
      <div class="reel-side-count">${CommentsEngine.getComments(cat.id).length}</div>
    </div>
  `;
  side.querySelector('.like-side').addEventListener('click',e=>{e.stopPropagation();doLike(cat.id,reel)});
  side.querySelector('.comments-side-btn').addEventListener('click',e=>{e.stopPropagation();openComments(cat)});
  reel.appendChild(side);

  const footer=document.createElement('div'); footer.className='reel-footer';
  footer.innerHTML=`
    <div class="cat-row">
      <div class="cat-ava">${esc(cat.avatar)}</div>
      <div>
        <div class="cat-name">${esc(cat.name)}</div>
        <div class="cat-origin">${esc(cat.origin)}</div>
      </div>
    </div>
    <div class="reel-bottom-bar">
      <button class="pill like-pill">
        <span>${cat.liked?'❤️':'🤍'}</span><span>${cat.likes}</span>
      </button>
      <button class="pill comments-pill">💬 ${CommentsEngine.getComments(cat.id).length}</button>
    </div>
  `;
  footer.querySelector('.like-pill').addEventListener('click',e=>{e.stopPropagation();doLike(cat.id,reel)});
  footer.querySelector('.comments-pill').addEventListener('click',e=>{e.stopPropagation();openComments(cat)});
  reel.appendChild(footer);

  let lastTap=0;
  reel.addEventListener('click',e=>{
    if(e.target.closest('.settings-btn,.reel-side-actions,.reel-bottom-bar')) return;
    const now=Date.now();
    if(now-lastTap<300){
      if(!cat.liked) doLike(cat.id,reel);
      hb.classList.remove('pop'); void hb.offsetWidth; hb.classList.add('pop');
    }
    lastTap=now;
  });

  return reel;
}

function doLike(id,reel){
  const cat=allCats.find(c=>c.id===id); if(!cat)return;
  cat.liked=!cat.liked; cat.likes+=cat.liked?1:-1; save();
  const pill=reel.querySelector('.like-pill');
  if(pill){pill.querySelector('span:first-child').textContent=cat.liked?'❤️':'🤍';pill.querySelector('span:last-child').textContent=cat.likes}
}

function renderFeed(){
  const area=$('contentArea'); area.innerHTML='';
  if(reelObs){reelObs.disconnect();reelObs=null}

  const feed=document.createElement('div'); feed.className='feed'; feed.id='feed';
  allCats.forEach(c=>{feed.appendChild(makeReel(c))});
  area.appendChild(feed);
  updateCounters();

  reelObs=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting&&entry.intersectionRatio>0.6){
        currentCatId=entry.target.dataset.id;
      }
    });
  },{threshold:[0.6]});

  feed.querySelectorAll('.reel').forEach(r=>reelObs.observe(r));
}

async function loadMore(){
  if(loading||cooldown||screen!=='feed')return; loading=true;
  try{
    const[ir,vr]=await Promise.allSettled([fetchJ(API_IMG,1),fetchJ(API_VID,1)]);
    let raw=[]; 
    if(ir.status==='fulfilled')raw.push(...ir.value); 
    if(vr.status==='fulfilled')raw.push(...vr.value);
    if(raw.length){
      const cats=raw.map((x,i)=>tocat(x,i)); 
      allCats.push(...cats);
      updateCounters();
    } else {
      cooldown=true;setTimeout(()=>cooldown=false,10000);
    }
  }catch{cooldown=true;setTimeout(()=>cooldown=false,10000)}
  finally{loading=false}
}

async function init(){
  document.documentElement.className = theme;
  loading=true;
  try{
    const[ir,vr]=await Promise.allSettled([fetchJ(API_IMG),fetchJ(API_VID)]);
    let raw=[];
    if(ir.status==='fulfilled')raw.push(...ir.value);
    if(vr.status==='fulfilled')raw.push(...vr.value);
    if(raw.length)allCats.push(...raw.map((x,i)=>tocat(x,i)));
    else allCats.push({id:'fb',shortId:makeShortId('fb'),name:'Котик',origin:'резерв',avatar:'😿',desc:'',url:'https://cdn2.thecatapi.com/images/9j5.jpg',type:'image',likes:7,liked:false});
  }catch{
    allCats.push({id:'fb',shortId:makeShortId('fb'),name:'Котик',origin:'офлайн',avatar:'😿',desc:'',url:'https://cdn2.thecatapi.com/images/9j5.jpg',type:'image',likes:7,liked:false});
  }finally{loading=false}

  if(stored.liked)allCats.forEach(c=>{if(stored.liked.includes(c.id))c.liked=true});
  renderFeed();
}

function renderProfile(){
  const area=$('contentArea'); area.innerHTML='';
  const liked=allCats.filter(c=>c.liked).length;
  const wrap=document.createElement('div'); wrap.className='profile-wrap';
  wrap.innerHTML=`
    <div class="profile-hero">
      <div class="profile-hero-actions">
        <button class="profile-hero-btn" id="editProfileBtn">✏️</button>
        <button class="profile-hero-btn" id="settingsBtn2">⚙️</button>
      </div>
      <div class="profile-top">
        <div class="profile-ava">${userProfile.emoji}</div>
        <div class="profile-stats">
          <div class="p-stat"><div class="p-stat-n">${myCats.length}</div><div class="p-stat-l">мои</div></div>
          <div class="p-stat"><div class="p-stat-n">${liked}</div><div class="p-stat-l">лайки</div></div>
          <div class="p-stat"><div class="p-stat-n">${allCats.length}</div><div class="p-stat-l">всего</div></div>
        </div>
      </div>
      <div class="profile-name">${esc(userProfile.nick)}</div>
      <div class="profile-bio">Обожаю котиков 😺 · Добавляй своих!</div>
    </div>
    <div class="p-tabs">
      <div class="p-tab active" data-tab="my">📦 Мои</div>
      <div class="p-tab" data-tab="liked">❤️ Лайкнутые</div>
    </div>
    <div class="p-grid" id="pgrid"></div>
  `;
  area.appendChild(wrap);

  wrap.querySelector('#editProfileBtn').addEventListener('click', openProfileEdit);
  wrap.querySelector('#settingsBtn2').addEventListener('click', openSettings);

  let activeTab='my';
  const grid=wrap.querySelector('#pgrid');
  const tabs=wrap.querySelectorAll('.p-tab');
  function renderGrid(tab){
    grid.innerHTML='';
    const items=tab==='my'?myCats:allCats.filter(c=>c.liked);
    if(!items.length){grid.innerHTML='<div class="p-empty">😿 здесь пока пусто</div>';return}
    items.forEach(cat=>{
      const cell=document.createElement('div'); cell.className='p-cell';
      if(cat.type==='video'){
        const v=document.createElement('video'); v.src=cat.url; v.preload='metadata'; v.muted=true;
        cell.appendChild(v);
      } else {
        const img=document.createElement('img'); img.src=cat.url;
        cell.appendChild(img);
      }
      grid.appendChild(cell);
    });
  }
  tabs.forEach(t=>t.addEventListener('click',()=>{tabs.forEach(x=>x.classList.remove('active'));t.classList.add('active');activeTab=t.dataset.tab;renderGrid(activeTab)}));
  renderGrid('my');
}

function setScreen(s){
  screen=s;
  document.querySelectorAll('[data-screen]').forEach(el=>el.classList.toggle('active',el.dataset.screen===s));
  if(s==='feed')renderFeed();
  else renderProfile();
}
document.querySelectorAll('[data-screen]').forEach(btn=>btn.addEventListener('click',()=>setScreen(btn.dataset.screen)));

function addCat({url,name,origin,avatar,type}){
  if(!url)return;
  const rawId='u_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
  const cat={id:rawId,shortId:makeShortId(rawId),name:name||'Мой кот',origin:origin||'загружен',avatar:avatar||'📱',desc:rand(CAPTIONS),url,type:type||'image',likes:5,liked:false};
  myCats.push(cat); allCats.unshift(cat); save();
  if(screen==='feed'){
    const feed=$('feed');
    if(feed){feed.prepend(makeReel(cat));feed.scrollTo({top:0,behavior:'smooth'})}
    else renderFeed();
  }
  updateCounters(); toast(`🐱 ${cat.name} добавлен!`);
}

function handleUrl(inputId){
  const el=$(inputId),url=el?.value.trim();
  if(!url){toast('Вставь ссылку 😿',true);return}
  addCat({url,name:'Кот по ссылке',origin:'URL',avatar:'🔗',type:/\.(mp4|webm|mov)$/i.test(url)?'video':'image'});
  el.value='';
}

$('addUrl').addEventListener('click',()=>handleUrl('urlInp'));
$('urlInp').addEventListener('keydown',e=>{if(e.key==='Enter')handleUrl('urlInp')});
$('addFile').addEventListener('click',()=>$('fileInput').click());
$('sideAdd').addEventListener('click',()=>handleUrl('sideUrl'));
$('sideUrl').addEventListener('keydown',e=>{if(e.key==='Enter')handleUrl('sideUrl')});
$('sideFile').addEventListener('click',()=>$('fileInput').click());
$('fileInput').addEventListener('change',e=>{
  const file=e.target.files[0]; if(!file)return;
  addCat({url:URL.createObjectURL(file),name:file.name.replace(/\.[^.]+$/,'').slice(0,22),origin:'с устройства',avatar:'📲',type:file.type.startsWith('video')?'video':'image'});
  e.target.value='';
});

function doSearch(fromSide) {
  const inpId = fromSide ? 'sideSearchInp' : 'searchInp';
  const q = ($(inpId).value||'').trim().toUpperCase().replace(/[^А-ЯA-Z0-9-]/g,'');
  if(!q) return;
  const found = allCats.find(c => (c.shortId||'').toUpperCase() === q);
  if(found) {
    toast('Найден: ' + found.shortId + ' 🐱');
  } else {
    toast(t('catNotFound'), true);
  }
  $(inpId).value = '';
}

$('searchGo').addEventListener('click', () => doSearch(false));
$('searchInp').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(false); });
if($('sideSearchGo')) {
  $('sideSearchGo').addEventListener('click', () => doSearch(true));
  $('sideSearchInp').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(true); });
}

document.getElementById('shareCloseBtn').addEventListener('click', () => {
  document.getElementById('shareOverlay').classList.remove('open');
});

window.addEventListener('beforeunload',save);
init();
})();
</script>
</body>
</html>
