<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>КОТО-РИЛС 🎵</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Onest:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#08060f;--surface:#0f0d1c;--surface2:#181530;
  --border:rgba(180,130,255,.15);--border2:rgba(180,130,255,.32);
  --accent:#b87fff;--accent2:#ff7eb3;--text:#f0e8ff;--dim:#9984c8;
  --font:'Onest',system-ui,sans-serif;
}

:root.light-mode{
  --bg:#f8f7fc;--surface:#f0e8ff;--surface2:#e8deff;
  --border:rgba(184,127,255,.2);--border2:rgba(184,127,255,.4);
  --accent:#9966ff;--accent2:#ff1493;--text:#1a0033;--dim:#8b7cb8;
}

:root.neon-mode{
  --bg:#0a0015;--surface:#1a0033;--surface2:#330066;
  --accent:#ff00ff;--accent2:#00ffff;--text:#ffff00;--dim:#ff00ff;
}

html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;transition:background .3s, color .3s}
button{border:none;background:none;color:inherit;font:inherit;cursor:pointer}
input,textarea,select{border:none;background:none;color:inherit;font:inherit;outline:none}

.app{width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden}

@media(min-width:900px){
  .app{flex-direction:row}
  .sidebar{display:flex!important;flex-direction:column;width:240px;min-width:240px;height:100%;background:var(--surface);border-right:1px solid var(--border);padding:28px 14px 24px;gap:4px;flex-shrink:0}
  .sidebar-logo{font-family:'Unbounded',sans-serif;font-size:1.15rem;font-weight:900;background:linear-gradient(120deg,#ffd6a8,#c97bff,#7ed4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;padding:8px 12px 20px}
  .sidebar .snav{display:flex;align-items:center;gap:14px;padding:13px 14px;border-radius:14px;font-weight:600;font-size:.95rem;color:var(--dim);cursor:pointer;transition:background .15s,color .15s;width:100%}
  .sidebar .snav:hover{background:var(--surface2);color:var(--text)}
  .sidebar .snav.active{background:var(--surface2);color:var(--text);font-weight:700}
  .sidebar .snav-icon{font-size:1.4rem;width:26px;text-align:center}
  .sidebar-spacer{flex:1}
  .sidebar-upload{display:flex;flex-direction:column;gap:10px;padding-top:16px;border-top:1px solid var(--border)}
  .sidebar-url{background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:11px 14px;font-size:.85rem;color:var(--text);width:100%}
  .sidebar-url::placeholder{color:var(--dim)}
  .sidebar-btn-row{display:flex;gap:8px}
  .sidebar-icon-btn{flex:1;height:42px;background:#6c4bc2;border-radius:10px;font-size:1.1rem;color:white;box-shadow:0 4px 0 #3d2d66;transition:transform .08s,box-shadow .08s}
  .sidebar-icon-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #3d2d66}
  .sidebar-counter-badge{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:7px 12px;font-size:.82rem;font-weight:700;color:var(--accent);text-align:center;margin-bottom:6px}
  .sidebar-search{display:flex;align-items:center;gap:0;background:var(--surface2);border:1px solid var(--border2);border-radius:12px;overflow:hidden;margin-bottom:4px}
  .sidebar-search-inp{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:.85rem;padding:11px 14px}
  .sidebar-search-inp::placeholder{color:var(--dim)}
  .sidebar-search-btn{background:none;border:none;cursor:pointer;padding:0 12px;font-size:1rem;color:var(--dim);transition:color .15s}
  .sidebar-search-btn:hover{color:var(--text)}
  .main-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
  .topbar{display:none!important}
  .bottom-nav{display:none!important}
  .upload-bar{display:none!important}
}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar-logo{font-family:'Unbounded',sans-serif;font-weight:900;font-size:1.2rem;background:linear-gradient(120deg,#ffd6a8,#c97bff,#7ed4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-counter{background:var(--surface2);border:1px solid var(--border2);border-radius:40px;padding:5px 14px;font-size:.8rem;font-weight:700;color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:10px}
.search-wrap{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border2);border-radius:100px;overflow:hidden;height:34px}
.search-inp{background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:.82rem;padding:0 12px;width:110px;transition:width .2s}
.search-inp:focus{width:150px}
.search-inp::placeholder{color:var(--dim)}
.search-go{background:none;border:none;cursor:pointer;padding:0 10px;font-size:.95rem;color:var(--dim);transition:color .15s}

.cat-short-id{position:absolute;top:14px;left:14px;z-index:10;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.18);border-radius:100px;padding:5px 12px;font-family:'Unbounded',sans-serif;font-size:.72rem;font-weight:700;color:rgba(255,255,255,.9);pointer-events:none;letter-spacing:.05em}
.sidebar{display:none}
.main-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.content-area{flex:1;overflow:hidden;min-height:0}

.feed{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.feed::-webkit-scrollbar{display:none}
.reel{height:100%;scroll-snap-align:start;scroll-snap-stop:always;position:relative;background:#000;display:flex;flex-direction:column;justify-content:flex-end;flex-shrink:0}
.media-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#000}
.media-wrap img,.media-wrap video{width:100%;height:100%;object-fit:cover;-webkit-user-select:none;user-select:none}
.media-fallback{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#2a1840,#6c3ba0);gap:10px;color:var(--accent)}
.media-fallback .fi{font-size:3.5rem}
.grad{position:absolute;bottom:0;left:0;right:0;height:58%;background:linear-gradient(to top,rgba(0,0,0,.93),transparent);pointer-events:none;z-index:2}

.pause-overlay{position:absolute;inset:0;z-index:8;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.32);opacity:0;pointer-events:none;transition:opacity .18s}
.pause-overlay.show{opacity:1}
.pause-icon{font-size:5rem;filter:drop-shadow(0 2px 20px rgba(0,0,0,.9))}

.overlay{position:fixed;inset:0;z-index:600;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.65);backdrop-filter:blur(10px);opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}

.sheet{width:100%;max-width:500px;background:var(--surface);border-radius:24px 24px 0 0;border-top:1px solid var(--border2);padding:16px 20px calc(28px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .28s cubic-bezier(.25,.8,.25,1)}
.overlay.open .sheet{transform:translateY(0)}
.sheet.tall{height:90vh;display:flex;flex-direction:column;padding:0}

.sheet-handle{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,.18);margin:0 auto 18px}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:linear-gradient(90deg,rgba(184,127,255,.1),rgba(255,126,179,.1))}
.sheet-title{font-family:'Unbounded',sans-serif;font-size:1rem;font-weight:900;background:linear-gradient(120deg,#ffd6a8,#ff7eb3);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.close-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:var(--dim);cursor:pointer;font-size:1.3rem;background:rgba(184,127,255,.1);border-radius:50%;transition:background .15s}
.close-btn:active{background:rgba(184,127,255,.25)}

.sheet-content{flex:1;overflow-y:auto;padding:20px}
.settings-section{margin-bottom:24px}
.settings-section-title{font-family:'Unbounded',sans-serif;font-size:.9rem;font-weight:700;color:var(--accent);margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em}
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:14px;background:rgba(184,127,255,.08);border:1px solid var(--border2);border-radius:12px;margin-bottom:10px;flex-wrap:wrap;gap:10px}
.settings-label{font-size:.9rem;color:var(--text);font-weight:600;flex:1;min-width:120px}
.settings-select{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-family:var(--font);font-size:.85rem;cursor:pointer;transition:border-color .15s;flex:1;min-width:150px}
.settings-select:focus{border-color:var(--accent)}
.settings-button{width:100%;padding:14px;background:linear-gradient(135deg,#b87fff,#ff7eb3);color:white;border-radius:12px;font-weight:700;font-size:.9rem;margin-top:8px;cursor:pointer;transition:transform .1s}
.settings-button:active{transform:scale(.98)}

.profile-edit-content{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column}
.profile-edit-field{margin-bottom:18px}
.profile-edit-label{font-size:.85rem;color:var(--dim);font-weight:600;margin-bottom:6px;display:block}
.profile-edit-input{width:100%;background:var(--surface2);border:1.5px solid var(--border2);border-radius:12px;padding:12px;color:var(--text);font-family:var(--font);font-size:.9rem;transition:border-color .15s}
.profile-edit-input:focus{border-color:var(--accent)}
.emoji-picker-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:8px}
.emoji-btn{background:rgba(184,127,255,.1);border:2px solid var(--border2);border-radius:10px;padding:10px;font-size:1.8rem;cursor:pointer;transition:all .15s}
.emoji-btn.active{background:rgba(184,127,255,.3);border-color:var(--accent)}
.profile-edit-save{width:100%;padding:14px;background:linear-gradient(135deg,#b87fff,#ff7eb3);color:white;border-radius:12px;font-weight:700;font-size:.9rem;cursor:pointer;margin-top:auto;transition:transform .1s}
.profile-edit-save:active{transform:scale(.98)}

.comment-item{display:flex;gap:10px;padding:14px;background:linear-gradient(135deg,rgba(184,127,255,.12),rgba(255,126,179,.08));border:1.5px solid var(--border2);border-radius:16px;animation:slideIn .3s ease-out;backdrop-filter:blur(10px);margin-bottom:10px}
.comment-ava{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;background:linear-gradient(135deg,#ff6b9d,#c44569);border:2px solid rgba(255,255,255,.3);box-shadow:0 4px 12px rgba(255,107,157,.3)}
.comment-body{flex:1;min-width:0}
.comment-name{font-weight:800;font-size:.85rem;color:var(--text);font-family:'Unbounded',sans-serif;background:linear-gradient(120deg,#ffd6a8,#ff7eb3);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.comment-time{font-size:.7rem;color:var(--dim);margin-left:6px}
.comment-text{font-size:.85rem;color:var(--text);margin-top:6px;line-height:1.5;word-wrap:break-word}
.comments-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--dim);font-size:1rem;text-align:center;padding:40px;flex-direction:column;gap:12px}
.comments-input-area{padding:16px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0;background:linear-gradient(180deg,transparent,rgba(184,127,255,.08))}
.comment-inp{flex:1;background:var(--surface2);border:1.5px solid var(--border2);border-radius:100px;padding:12px 18px;font-size:.85rem;color:var(--text);max-height:100px;resize:none;transition:border-color .15s}
.comment-inp:focus{border-color:var(--accent);background:rgba(184,127,255,.1)}
.comment-send-btn{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#b87fff,#ff7eb3);display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:white;flex-shrink:0;cursor:pointer;box-shadow:0 4px 12px rgba(184,127,255,.4);transition:transform .1s}
.comment-send-btn:active{transform:scale(.92)}

.viz-bar{position:absolute;bottom:0;left:0;right:0;height:3px;z-index:10;overflow:hidden;background:transparent}
.viz-progress{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;transition:none}

.music-ticker-wrap{position:absolute;bottom:185px;left:18px;right:74px;z-index:6;overflow:hidden;pointer-events:none}
.music-ticker{display:flex;align-items:center;gap:8px;font-size:.78rem;color:rgba(255,255,255,.88);white-space:nowrap}
.music-disc{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#2a1840,#6c3ba0);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;border:1.5px solid rgba(255,255,255,.3);animation:discSpin 3s linear infinite;animation-play-state:paused}
.music-disc.playing{animation-play-state:running}
@keyframes discSpin{to{transform:rotate(360deg)}}

.wave-vis{position:absolute;right:14px;bottom:360px;z-index:6;display:flex;align-items:flex-end;gap:2px;height:28px}
.wave-bar{width:3px;border-radius:2px;background:rgba(255,255,255,.7);min-height:3px;transition:height .08s ease}

.reel-side-actions{position:absolute;right:14px;bottom:110px;display:flex;flex-direction:column;align-items:center;gap:22px;z-index:5}
.reel-side-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.reel-side-icon{font-size:1.8rem;filter:drop-shadow(0 2px 6px rgba(0,0,0,.7));transition:transform .1s}
.reel-side-btn:active .reel-side-icon{transform:scale(.88)}
.reel-side-count{font-size:.72rem;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.8)}

.mute-btn,.settings-btn{position:absolute;top:14px;z-index:10;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer;transition:background .15s}
.mute-btn:active,.settings-btn:active{transform:scale(.9)}
.mute-btn{right:14px}
.settings-btn{right:60px}

.reel-footer{position:relative;z-index:4;padding:0 70px 28px 18px;display:flex;flex-direction:column;gap:10px}
.cat-row{display:flex;align-items:center;gap:12px}
.cat-ava{width:46px;height:46px;border-radius:50%;background:linear-gradient(145deg,#b87fff,#ff7eb3);display:flex;align-items:center;justify-content:center;font-size:1.6rem;border:2px solid rgba(255,255,255,.55);flex-shrink:0}
.cat-name{font-family:'Unbounded',sans-serif;font-weight:700;font-size:1rem;text-shadow:0 2px 8px rgba(0,0,0,.8)}
.cat-origin{color:#c5a8ff;font-size:.78rem;margin-top:1px}

.reel-bottom-bar{display:flex;gap:8px;flex-wrap:wrap}
.pill{background:rgba(8,6,15,.65);backdrop-filter:blur(14px);border:1.5px solid rgba(180,130,255,.3);border-radius:100px;padding:9px 20px;color:var(--text);font-weight:700;font-size:.9rem;display:flex;align-items:center;gap:7px;cursor:pointer;transition:transform .1s}
.pill:active{transform:scale(.92)}

.upload-bar{background:var(--surface);border-top:1px solid var(--border);padding:10px 12px;display:flex;gap:8px;align-items:center;flex-shrink:0}
.url-inp{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:100px;padding:11px 16px;font-size:.88rem;color:var(--text)}
.url-inp::placeholder{color:var(--dim)}
.icon-btn{width:44px;height:44px;background:#6c4bc2;border-radius:50%;font-size:1.1rem;color:white;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 0 #3d2d66;transition:transform .08s;flex-shrink:0}
.icon-btn:active{transform:translateY(3px)}

.bottom-nav{display:flex;background:var(--surface);border-top:1px solid var(--border);padding:6px 0 calc(6px + env(safe-area-inset-bottom));flex-shrink:0}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;color:var(--dim);font-size:.72rem;font-weight:600;cursor:pointer;border-radius:14px;transition:color .15s}
.bnav-btn.active{color:var(--text)}

.profile-wrap{height:100%;overflow-y:auto;background:var(--bg)}
.profile-hero{padding:28px 20px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:relative}
.profile-hero-actions{position:absolute;top:20px;right:20px;display:flex;gap:10px}
.profile-hero-btn{width:40px;height:40px;background:rgba(184,127,255,.2);border:1px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer}
.profile-top{display:flex;align-items:center;gap:22px;margin-bottom:18px}
.profile-ava{width:80px;height:80px;border-radius:50%;background:linear-gradient(145deg,#8e5fd6,#e06aaa);display:flex;align-items:center;justify-content:center;font-size:2.8rem;border:3px solid var(--bg);box-shadow:0 0 0 2px var(--accent);flex-shrink:0}
.profile-stats{display:flex;gap:28px}
.p-stat{text-align:center}
.p-stat-n{font-family:'Unbounded',sans-serif;font-size:1.4rem;font-weight:900}
.p-stat-l{font-size:.78rem;color:var(--dim);margin-top:2px}
.profile-name{font-family:'Unbounded',sans-serif;font-size:.9rem;font-weight:700;margin-bottom:4px}
.profile-bio{font-size:.82rem;color:var(--dim);line-height:1.5}

.p-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface)}
.p-tab{flex:1;text-align:center;padding:15px;font-weight:700;color:var(--dim);cursor:pointer;border-bottom:2.5px solid transparent;transition:color .15s}
.p-tab.active{color:var(--text);border-bottom-color:var(--accent)}

.p-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:2px}
.p-cell{aspect-ratio:1;background:var(--surface2);overflow:hidden;cursor:pointer;position:relative}
.p-cell img,.p-cell video{width:100%;height:100%;object-fit:cover}
.p-cell-fb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;background:#12103a}
.p-empty{grid-column:span 3;text-align:center;padding:60px 20px;color:var(--dim)}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(12,10,24,.94);backdrop-filter:blur(14px);border:1.5px solid var(--accent);color:var(--text);padding:10px 24px;border-radius:100px;font-size:.85rem;font-weight:700;z-index:999;white-space:nowrap;animation:tst 2.6s forwards}
@keyframes tst{0%{opacity:0;transform:translateX(-50%) translateY(16px)}14%{opacity:1}80%{opacity:1}100%{opacity:0}}

.heart-burst{position:absolute;inset:0;z-index:6;display:flex;align-items:center;justify-content:center;font-size:5rem;pointer-events:none;opacity:0}
.heart-burst.pop{animation:hpop .65s forwards}
@keyframes hpop{0%{opacity:0;transform:scale(.4)}25%{opacity:1}55%{opacity:1}100%{opacity:0}}

@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.download-progress{width:100%;height:6px;background:rgba(184,127,255,.2);border-radius:3px;margin-top:12px;overflow:hidden}
.download-progress-bar{height:100%;background:linear-gradient(90deg,#b87fff,#ff7eb3);width:0%;transition:width .2s}

.verified-badge{
  display:inline-flex;
  align-items:center;
  gap:3px;
  margin-left:6px;
  vertical-align:middle;
}
.badge-check{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:18px;
  height:18px;
  border-radius:50%;
  font-size:11px;
  font-weight:bold;
  color:white;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
}
.badge-check.user{
  background:#1e88e5;
}
.badge-check.creator{
  background:#fbc02d;
  color:#000;
}
</style>
</head>
<body>

<!-- OVERLAYS -->
<div class="overlay" id="shareOverlay"><div class="sheet"><div class="sheet-handle"></div><div style="font-family:'Unbounded',sans-serif;font-size:.92rem;font-weight:700;text-align:center;margin-bottom:16px" id="shareTitle">Поделиться котом 🐱</div><button class="share-close-btn" id="shareCloseBtn" style="width:100%;padding:13px;background:var(--surface2);border-radius:12px;font-weight:700;font-size:.9rem;color:var(--dim)">Закрыть</button></div></div>

<div class="overlay" id="commentsOverlay"><div class="sheet tall"><div class="sheet-header"><div class="sheet-title" id="commentsTitle">🐾 Мяукай</div><div class="close-btn" id="commentsClose">✕</div></div><div style="flex:1;overflow-y:auto;padding:16px" id="commentsList"></div><div class="comments-input-area"><input type="text" class="comment-inp" id="commentInp" placeholder="Мяу…" maxlength="180"><button class="comment-send-btn" id="commentSendBtn">✓</button></div></div></div>

<div class="overlay" id="settingsOverlay"><div class="sheet tall"><div class="sheet-header"><div class="sheet-title" id="settingsTitle">⚙️ Настройки</div><div class="close-btn" id="settingsClose">✕</div></div><div class="sheet-content" id="settingsContent"></div></div></div>

// ========== АУДИО (без изменений) ==========
const AudioEngine = (() => {
  let ctx=null,masterGain=null,currentNodes=[],muted=false,vizCallback=null,analyser=null,animFrame=null;
  function seededRand(seed){let s=seed;return()=>{s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff}}
  function hashStr(str){let h=5381;for(let i=0;i<str.length;i++)h=(h*33)^str.charCodeAt(i);return h>>>0}
  const SCALES={pentatonic:[0,2,4,7,9],minor:[0,2,3,5,7,8,10],major:[0,2,4,5,7,9,11],blues:[0,3,5,6,7,10],dorian:[0,2,3,5,7,9,10]};
  const SCALE_NAMES=Object.keys(SCALES);
  function ensureCtx(){if(!ctx){ctx=new(window.AudioContext||window.webkitAudioContext)();masterGain=ctx.createGain();masterGain.gain.value=muted?0:0.55;analyser=ctx.createAnalyser();analyser.fftSize=64;masterGain.connect(analyser);analyser.connect(ctx.destination);}if(ctx.state==='suspended')ctx.resume();return ctx;}
  function stopAll(){cancelAnimationFrame(animFrame);currentNodes.forEach(n=>{try{n.stop&&n.stop();n.disconnect&&n.disconnect()}catch{}});currentNodes=[];vizCallback=null;}
  function makeLofiChain(output){const ac=ensureCtx();const lpf=ac.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=2200;lpf.Q.value=0.7;const wet=ac.createGain();wet.gain.value=0.18;const dry=ac.createGain();dry.gain.value=0.82;lpf.connect(dry);dry.connect(output);lpf.connect(wet);wet.connect(output);return lpf;}
  function makeVinylNoise(output,rng){const ac=ensureCtx(),bufSize=ac.sampleRate*2,buf=ac.createBuffer(1,bufSize,ac.sampleRate),data=buf.getChannelData(0);for(let i=0;i<bufSize;i++)data[i]=(rng()-0.5)*0.015;const src=ac.createBufferSource();src.buffer=buf;src.loop=true;const g=ac.createGain();g.gain.value=0.06;src.connect(g);g.connect(output);src.start();currentNodes.push(src,g);}
  function makeBass(rootHz,scale,bpm,output,rng){const ac=ensureCtx(),beatSec=60/bpm,bassNotes=[0,0,scale[2]||3,scale[4]||7];function schedBeat(time){const note=bassNotes[Math.floor(rng()*bassNotes.length)];const freq=rootHz*Math.pow(2,note/12)/2;const osc=ac.createOscillator();osc.type='triangle';osc.frequency.setValueAtTime(freq,time);const env=ac.createGain();env.gain.setValueAtTime(0,time);env.gain.linearRampToValueAtTime(0.28,time+0.02);env.gain.exponentialRampToValueAtTime(0.001,time+beatSec*0.9);const lpf=ac.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=400;osc.connect(lpf);lpf.connect(env);env.connect(output);osc.start(time);osc.stop(time+beatSec);currentNodes.push(osc,env,lpf);}let nextBeat=ac.currentTime+0.1;function scheduler(){while(nextBeat<ac.currentTime+0.3){schedBeat(nextBeat);nextBeat+=beatSec*(rng()>0.7?2:1)}}const tid=setInterval(scheduler,100);currentNodes.push({stop:()=>clearInterval(tid),disconnect:()=>{}});}
  function makeMelody(rootHz,scale,bpm,output,rng){const ac=ensureCtx(),beatSec=60/bpm;const pattern=Array.from({length:16},(_,i)=>{if(rng()<0.3)return null;const step=scale[Math.floor(rng()*scale.length)];const octave=rng()>0.7?12:0;return step+octave});let step=0;function schedNote(time){const note=pattern[step%pattern.length];step++;if(note===null)return;const freq=rootHz*Math.pow(2,note/12);const osc=ac.createOscillator();osc.type=['sine','triangle','sine'][Math.floor(rng()*3)];osc.frequency.setValueAtTime(freq,time);const vibLfo=ac.createOscillator();vibLfo.frequency.value=4.5+rng()*2;const vibGain=ac.createGain();vibGain.gain.value=freq*0.005;vibLfo.connect(vibGain);vibGain.connect(osc.frequency);vibLfo.start(time);const env=ac.createGain(),dur=beatSec*0.5;env.gain.setValueAtTime(0,time);env.gain.linearRampToValueAtTime(0.22,time+0.03);env.gain.exponentialRampToValueAtTime(0.001,time+dur);osc.connect(env);env.connect(output);osc.start(time);osc.stop(time+dur+0.05);vibLfo.stop(time+dur+0.05);currentNodes.push(osc,vibLfo,vibGain,env);}const stepSec=beatSec*0.5;let nextStep=ac.currentTime+0.1;function scheduler(){while(nextStep<ac.currentTime+0.4){schedNote(nextStep);nextStep+=stepSec}}const tid=setInterval(scheduler,100);currentNodes.push({stop:()=>clearInterval(tid),disconnect:()=>{}});}
  function makePad(rootHz,scale,bpm,output,rng){const ac=ensureCtx(),chordDur=(60/bpm)*4;const chordSteps=[[0,scale[2]||3,scale[4]||7],[scale[1]||2,scale[3]||5,scale[5]||9],[scale[2]||3,scale[4]||7,scale[6]||11],[0,scale[2]||3,scale[4]||7]];let chordIdx=Math.floor(rng()*chordSteps.length);function schedChord(time){const steps=chordSteps[chordIdx%chordSteps.length];chordIdx++;steps.forEach(step=>{const osc=ac.createOscillator();osc.type='sine';osc.frequency.value=rootHz*Math.pow(2,step/12);const env=ac.createGain();env.gain.setValueAtTime(0,time);env.gain.linearRampToValueAtTime(0.07,time+0.4);env.gain.setValueAtTime(0.07,time+chordDur-0.5);env.gain.linearRampToValueAtTime(0,time+chordDur);osc.connect(env);env.connect(output);osc.start(time);osc.stop(time+chordDur+0.1);currentNodes.push(osc,env);});}let nextChord=ac.currentTime+0.05;function scheduler(){while(nextChord<ac.currentTime+0.5){schedChord(nextChord);nextChord+=chordDur}}const tid=setInterval(scheduler,200);currentNodes.push({stop:()=>clearInterval(tid),disconnect:()=>{}});}
  function makeDrums(bpm,output,rng){const ac=ensureCtx(),beatSec=60/bpm;function makeKick(time){const osc=ac.createOscillator();osc.type='sine';osc.frequency.setValueAtTime(160,time);osc.frequency.exponentialRampToValueAtTime(40,time+0.15);const env=ac.createGain();env.gain.setValueAtTime(0.35,time);env.gain.exponentialRampToValueAtTime(0.001,time+0.18);osc.connect(env);env.connect(output);osc.start(time);osc.stop(time+0.2);currentNodes.push(osc,env);}function makeHat(time,loud=false){const bufSize=Math.floor(ac.sampleRate*0.06),buf=ac.createBuffer(1,bufSize,ac.sampleRate),d=buf.getChannelData(0);for(let i=0;i<bufSize;i++)d[i]=(Math.random()-0.5)*2;const src=ac.createBufferSource();src.buffer=buf;const hpf=ac.createBiquadFilter();hpf.type='highpass';hpf.frequency.value=7000;const env=ac.createGain();env.gain.setValueAtTime(loud?0.12:0.06,time);env.gain.exponentialRampToValueAtTime(0.001,time+0.05);src.connect(hpf);hpf.connect(env);env.connect(output);src.start(time);src.stop(time+0.07);currentNodes.push(src,hpf,env);}let beat=0,nextTime=ac.currentTime+0.1;function scheduler(){while(nextTime<ac.currentTime+0.35){const b=beat%8;if(b===0||b===4)makeKick(nextTime);if(rng()>0.2)makeHat(nextTime,b%2===0);nextTime+=beatSec*0.5;beat++;}}const tid=setInterval(scheduler,100);currentNodes.push({stop:()=>clearInterval(tid),disconnect:()=>{}});}
  function startVisualizer(cb){if(!analyser)return;const data=new Uint8Array(analyser.frequencyBinCount);vizCallback=cb;function loop(){animFrame=requestAnimationFrame(loop);analyser.getByteFrequencyData(data);if(vizCallback)vizCallback(data)}loop();}
  function playCat(catId,onVizUpdate){stopAll();ensureCtx();const rng=seededRand(hashStr(catId));const ROOTS=[261.63,293.66,311.13,329.63,349.23,392.00,415.30,440.00];const rootHz=ROOTS[Math.floor(rng()*ROOTS.length)];const scaleName=SCALE_NAMES[Math.floor(rng()*SCALE_NAMES.length)];const scale=SCALES[scaleName];const bpm=70+Math.floor(rng()*25);const chain=makeLofiChain(masterGain);makePad(rootHz,scale,bpm,chain,seededRand(hashStr(catId+'pad')));makeBass(rootHz,scale,bpm,chain,seededRand(hashStr(catId+'bass')));makeMelody(rootHz,scale,bpm,chain,seededRand(hashStr(catId+'mel')));makeDrums(bpm,chain,seededRand(hashStr(catId+'drum')));makeVinylNoise(chain,seededRand(hashStr(catId+'noise')));const ADJECTIVES=['Сонный','Мурлычащий','Ночной','Тёплый','Пушистый','Ленивый','Уютный','Мечтательный'];const NOUNS=['кот FM','lofi beats','purr radio','мяу tape','нян-нян wave','котовасия'];const rng2=seededRand(hashStr(catId+'name'));const trackName=ADJECTIVES[Math.floor(rng2()*ADJECTIVES.length)]+' '+NOUNS[Math.floor(rng2()*NOUNS.length)];if(onVizUpdate)startVisualizer(onVizUpdate);return{trackName,bpm,scale:scaleName};}
  function suspendAudio(){if(ctx&&ctx.state==='running')ctx.suspend()}
  function resumeAudio(){if(ctx&&ctx.state==='suspended')ctx.resume()}
  function setMute(val){muted=val;if(masterGain)masterGain.gain.setTargetAtTime(muted?0:0.55,ensureCtx().currentTime,0.05)}
  function getMuted(){return muted}
  function stop(){stopAll();cancelAnimationFrame(animFrame)}
  return{playCat,suspendAudio,resumeAudio,setMute,getMuted,stop};
})();

function saveBanned() { localStorage.setItem('bannedUsers', JSON.stringify(bannedUsers)); }

function banUser(nick) {
  if (!nick || nick.trim() === '') return;
  if (nick === userProfile.nick) { toast(t('selfBan'), true); return; }
  if (bannedUsers.includes(nick)) { toast('Уже забанен'); return; }
  bannedUsers.push(nick);
  saveBanned();
  // Удаляем все коты этого пользователя
  const toRemove = allCats.filter(c => c.owner === nick);
  toRemove.forEach(cat => {
    const idx = allCats.findIndex(c => c.id === cat.id);
    if (idx !== -1) allCats.splice(idx,1);
    const myIdx = myCats.findIndex(c => c.id === cat.id);
    if (myIdx !== -1) myCats.splice(myIdx,1);
  });
  save();
  toast(`🔨 ${nick} ${t('userBanned')}`);
  if (screen === 'feed') renderFeed();
  else if (screen === 'profile') renderProfile();
}

function unbanUser(nick) {
  if (!nick || nick.trim() === '') return;
  const idx = bannedUsers.indexOf(nick);
  if (idx !== -1) bannedUsers.splice(idx,1);
  saveBanned();
  toast(`🔓 ${nick} ${t('userUnbanned')}`);
  if (screen === 'profile') renderProfile();
}

async function fetchJ(url,retries=2){
  for(let i=0;i<=retries;i++){
    try{ const r=await fetch(url+'&_='+Date.now()); if(!r.ok) throw new Error(r.status); return await r.json(); }
    catch(e){ if(i===retries) throw e; await new Promise(r=>setTimeout(r,700*(i+1))); }
  }
}
function makeShortId(seed) {
  const chars = 'АБВГДЕЖЗИКЛ';
  const nums  = '0123456789';
  let s = typeof seed === 'string' ? seed : String(seed);
  let h = 5381;
  for(let i=0;i<s.length;i++) h=(h*33)^s.charCodeAt(i);
  h = h>>>0;
  return 'КОТ-' + chars[h%chars.length] + nums[(h>>4)%10] + chars[(h>>8)%chars.length] + nums[(h>>12)%10];
}

  return{
    id: rawId,
    shortId: makeShortId(rawId),
    name:names[i%names.length]+' '+(i+1),
    origin:'The Cat API',
    avatar:AVATARS[i%AVATARS.length],
    desc:rand(captions),
    url:item.url,
    type:item.url.endsWith('.mp4')?'video':'image',
    likes:70+Math.floor(Math.random()*200),
    liked:false,
    owner: '🐱 API'
  };
}
function makeMedia(cat){ const wrap=document.createElement('div'); wrap.className='media-wrap'; if(cat.type==='video'){ const v=document.createElement('video'); v.src=cat.url; v.loop=v.muted=false; v.playsInline=true; v.preload='auto'; v.style.width='100%'; v.style.height='100%'; v.style.objectFit='cover'; v.addEventListener('loadedmetadata',()=>{ wrap.dataset.hasAudio = v.mozHasAudio !== undefined ? v.mozHasAudio : true; }); v.onerror=()=>{wrap.innerHTML='<div class="media-fallback"><div class="fi">😿</div></div>'}; wrap.appendChild(v); vidObs.observe(v); } else { const img=document.createElement('img'); img.src=cat.url; img.style.width='100%'; img.style.height='100%'; img.style.objectFit='cover'; wrap.appendChild(img); } return wrap; }

  let lastTap=0; reel.addEventListener('click',e=>{ if(e.target.closest('.settings-btn,.reel-side-actions,.reel-bottom-bar')) return; const now=Date.now(); if(now-lastTap<300){ if(!cat.liked) doLike(cat.id,reel); hb.classList.remove('pop'); void hb.offsetWidth; hb.classList.add('pop'); } else { if(currentCatId===cat.id){ isPaused=!isPaused; if(isPaused){ AudioEngine.suspendAudio(); disc.classList.remove('playing'); pauseOvr.classList.add('show'); reel.querySelector('video')?.pause(); } else { AudioEngine.resumeAudio(); disc.classList.add('playing'); pauseOvr.classList.remove('show'); reel.querySelector('video')?.play().catch(()=>{}); } } } lastTap=now; });
  let progVal=0; reel._startMusic=()=>{ if(currentCatId===cat.id) return; currentCatId=cat.id; isPaused=false; pauseOvr.classList.remove('show'); disc.classList.add('playing'); const mediaWrap = reel.querySelector('.media-wrap'); const hasAudio = mediaWrap?.dataset?.hasAudio !== 'false' && cat.type === 'video'; if(hasAudio && cat.type === 'video') { AudioEngine.stop(); const video = reel.querySelector('video'); if(video) { video.muted = false; video.volume = 1; textInner.textContent = '🎬 ' + cat.name + ' • Оригинальный звук'; textInner.classList.add('scrolling'); } } else { const trackInfo=AudioEngine.playCat(cat.id,(freqData)=>{ const bands=[0,1,2,4,6,8,12]; bands.forEach((b,i)=>{ const v=freqData[b]||0; const h=Math.max(3,(v/255)*26); if(waveBars[i]) waveBars[i].style.height=h+'px'; }); progVal=(progVal+0.03)%100; vizProg.style.width=progVal+'%'; }); if(trackInfo){ const label=`♫ ${trackInfo.trackName} • ${trackInfo.bpm} BPM • ${trackInfo.scale}`; textInner.textContent=label+'   '+label; textInner.classList.add('scrolling'); } } }; reel._stopMusic=()=>{ disc.classList.remove('playing'); textInner.classList.remove('scrolling'); waveBars.forEach(b=>b.style.height='3px'); pauseOvr.classList.remove('show'); const video = reel.querySelector('video'); if(video) video.muted = true; }; return reel;
}

function openComments(cat){ const overlay = document.getElementById('commentsOverlay'); const list = document.getElementById('commentsList'); const inp = document.getElementById('commentInp'); overlay.classList.add('open'); function renderComments() { const comments = CommentsEngine.getComments(cat.id); list.innerHTML = ''; if (comments.length === 0) { list.innerHTML = '<div class="comments-empty"><div style="font-size:3rem">🐱</div></div>'; return; } comments.forEach(cmt => { const item = document.createElement('div'); item.className = 'comment-item'; item.innerHTML = `<div class="comment-ava">${cmt.emoji}</div><div class="comment-body"><div><span class="comment-name">${esc(cmt.author)}</span>${getVerifiedBadge(cmt.author)}<span class="comment-time">${cmt.time}</span></div><div class="comment-text">${esc(cmt.text)}</div></div>`; list.appendChild(item); }); list.scrollTop = list.scrollHeight; } renderComments(); inp.focus(); function sendComment() { const text = inp.value.trim(); if (!text) return; CommentsEngine.addComment(cat.id, text); inp.value = ''; setTimeout(() => renderComments(), 100); } document.getElementById('commentSendBtn').onclick = sendComment; inp.onkeydown = (e) => { if (e.key === 'Enter') sendComment(); }; } document.getElementById('commentsClose').addEventListener('click', () => { document.getElementById('commentsOverlay').classList.remove('open'); });

oadBtn').addEventListener('click', async () => { const btn = document.getElementById('downloadBtn'); const progress = document.getElementById('downloadProgress'); const progressBar = document.getElementById('downloadProgressBar'); btn.disabled = true; btn.textContent = t('downloading'); progress.style.display = 'block'; progressBar.style.width = '0%'; try { for (let i = 0; i < 10; i++) { const response = await fetch(API_IMG + '&_=' + Date.now()); if (!response.ok) throw new Error('Network error'); const data = await response.json(); await new Promise(r => setTimeout(r, 200)); progressBar.style.width = ((i + 1) * 10) + '%'; } const dataStr = JSON.stringify([], null, 2); const blob = new Blob([dataStr], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'kotoreels_200_cats.json'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); progressBar.style.width = '100%'; await new Promise(r => setTimeout(r, 500)); progress.style.display = 'none'; btn.textContent = t('download'); btn.disabled = false; toast('💾'); } catch (e) { progress.style.display = 'none'; btn.textContent = t('download'); btn.disabled = false; toast('❌'); } }); } function closeSettings(){ document.getElementById('settingsOverlay').classList.remove('open'); } document.getElementById('settingsClose').addEventListener('click', closeSettings);

function renderFeed(){ const area=$('contentArea'); area.innerHTML=''; if(reelObs){reelObs.disconnect();reelObs=null} AudioEngine.stop(); currentCatId=null; isPaused=false; const feed=document.createElement('div'); feed.className='feed'; feed.id='feed'; const reels=[]; allCats.forEach(c=>{const r=makeReel(c);reels.push(r);feed.appendChild(r)}); area.appendChild(feed); updateCounters(); reelObs=new IntersectionObserver(entries=>{ entries.forEach(entry=>{ const r=entry.target; if(entry.isIntersecting&&entry.intersectionRatio>0.6){ isPaused=false; r._startMusic&&r._startMusic(); } else { if(r.dataset.id===currentCatId){ const video = r.querySelector('video'); if(video) video.muted = true; r._stopMusic&&r._stopMusic(); currentCatId=null; } } }); },{threshold:[0.6]}); reels.forEach(r=>reelObs.observe(r)); const sentinel=document.createElement('div'); sentinel.style.height='4px'; feed.appendChild(sentinel); new IntersectionObserver(entries=>{ if(entries[0].isIntersecting&&!loading&&!cooldown&&screen==='feed') loadMore(); },{root:feed,threshold:0.1}).observe(sentinel); }
async function loadMore(){ if(loading||cooldown||screen!=='feed')return; loading=true; const feed=$('feed'); const sentinel=feed?.lastElementChild; const ls=document.createElement('div'); ls.className='loading-slide'; ls.id='ls'; ls.innerHTML='<div class="spinner"></div><span>'+t('loadingCats')+'</span>'; if(feed&&sentinel)feed.insertBefore(ls,sentinel); try{ const[ir,vr]=await Promise.allSettled([fetchJ(API_IMG,1),fetchJ(API_VID,1)]); let raw=[]; if(ir.status==='fulfilled')raw.push(...ir.value); if(vr.status==='fulfilled')raw.push(...vr.value); if(!raw.length){cooldown=true;toast('❌');setTimeout(()=>cooldown=false,10000)} else{ const cats=raw.map((x,i)=>tocat(x,i)); allCats.push(...cats); if(feed&&sentinel)cats.forEach(c=>{const r=makeReel(c);reelObs?.observe(r);feed.insertBefore(r,ls)}); updateCounters(); toast(`➕ ${cats.length}`); } }catch{toast('❌');cooldown=true;setTimeout(()=>cooldown=false,10000)} finally{$('ls')?.remove();loading=false} }

tor('#pgrid'); const tabs=wrap.querySelectorAll('.p-tab'); function renderGrid(tab){ grid.innerHTML=''; const items=tab==='my'?myCats:allCats.filter(c=>c.liked); if(!items.length){grid.innerHTML='<div class="p-empty">😿 пусто</div>';return} items.forEach(cat=>{ const cell=document.createElement('div'); cell.className='p-cell'; if(cat.type==='video'){ const v=document.createElement('video'); v.src=cat.url; v.preload='metadata'; v.muted=true; cell.appendChild(v); } else { const img=document.createElement('img'); img.src=cat.url; cell.appendChild(img); } grid.appendChild(cell); }); } tabs.forEach(t=>t.addEventListener('click',()=>{tabs.forEach(x=>x.classList.remove('active'));t.classList.add('active');activeTab=t.dataset.tab;renderGrid(activeTab)})); renderGrid('my'); }
